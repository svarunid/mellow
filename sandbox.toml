[server]
host = "0.0.0.0"
port = 8080

[docker]
# Use the shared network so the server can reach sandbox containers directly.
# This must match the network defined in docker-compose.yml.
network = "mellow"

# host_ip is how endpoint URLs are constructed for clients.
# "host.docker.internal" resolves to the Docker host from inside containers.
host_ip = "host.docker.internal"
